<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="A ROC-A study app for lessons, practice exams, flashcards, reference material, and local progress tracking."
    >
    <title>ROC-A Study App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Fraunces:opsz,wght@9..144,650;9..144,800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" aria-label="Main navigation">
        <a class="brand" href="#home" data-view="home" aria-label="ROC-A Study App home">
          <span class="brand-mark">RA</span>
          <span>
            <strong>ROC-A Study</strong>
            <small>Exam prep tool</small>
          </span>
        </a>
        <nav class="nav">
          <button class="nav-link active" type="button" data-view="home">Dashboard</button>
          <button class="nav-link" type="button" data-view="studyPlan">Study Plan</button>
          <button class="nav-link" type="button" data-view="lessons">Lessons</button>
          <button class="nav-link" type="button" data-view="exam">Practice Exam</button>
          <button class="nav-link" type="button" data-view="flashcards">Flashcards</button>
          <button class="nav-link" type="button" data-view="reference">Reference</button>
          <button class="nav-link" type="button" data-view="progress">Progress</button>
          <button class="nav-link" type="button" data-view="about">About</button>
        </nav>
        <div class="storage-note">
          <strong>Private progress</strong>
          <span>Your study history stays on this device.</span>
        </div>
      </aside>

      <main class="content" id="app" tabindex="-1">
        <section class="loading-card">
          <p class="eyebrow">Loading study material</p>
          <h1>Preparing your ROC-A workspace...</h1>
        </section>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
