name: Build App

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install customtkinter pyinstaller

      - name: Build EXE
        run: pyinstaller roca_study_app.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ROCAStudyApp-Windows
          path: dist/ROCAStudyApp.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install customtkinter pyinstaller

      - name: Build macOS .app bundle
        run: pyinstaller roca_study_app_macos.spec

      - name: Create DMG
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p dmg_contents
          cp -R dist/ROCAStudyApp.app dmg_contents/
          # Create a symbolic link to Applications for drag-and-drop install
          ln -s /Applications dmg_contents/Applications

          # Create the DMG
          hdiutil create -volname "ROC-A Study App" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            dist/ROCAStudyApp.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ROCAStudyApp-macOS
          path: dist/ROCAStudyApp.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ROCAStudyApp-Windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ROCAStudyApp-macOS
          path: artifacts/macos

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ROC-A Study App (Latest Build)
          body: |
            ## Downloads

            - **Windows**: Download `ROCAStudyApp.exe` and double-click to run
            - **macOS**: Download `ROCAStudyApp.dmg`, open it, and drag the app to your Applications folder

            No Python installation required. Built automatically from the latest code on master.

            > **macOS users**: On first launch, right-click the app and select "Open" to bypass the Gatekeeper warning (the app is not signed with an Apple Developer certificate).
          files: |
            artifacts/windows/ROCAStudyApp.exe
            artifacts/macos/ROCAStudyApp.dmg
          make_latest: true
          prerelease: false
