name: Build Windows EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install customtkinter pyinstaller

      - name: Build EXE
        run: pyinstaller roca_study_app.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ROCAStudyApp
          path: dist/ROCAStudyApp.exe

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ROC-A Study App (Latest Build)
          body: |
            Download **ROCAStudyApp.exe** below and double-click to run. No Python installation required.

            Built automatically from the latest code on master.
          files: dist/ROCAStudyApp.exe
          make_latest: true
          prerelease: false
